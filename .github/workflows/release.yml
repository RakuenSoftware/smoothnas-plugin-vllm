name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: wrapper tests
        working-directory: wrapper
        run: |
          go vet ./...
          go test -race ./...

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: cuda, base: vllm/vllm-openai:latest }
          - { name: rocm, base: vllm/vllm-openai-rocm:latest }
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image ref
        id: image
        run: echo "ref=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ steps.version.outputs.version }}-${{ matrix.variant.name }}" >> "$GITHUB_OUTPUT"

      - name: Build + push (${{ matrix.variant.name }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
          build-args: |
            VLLM_BASE=${{ matrix.variant.base }}
          provenance: false

      - name: Write digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "buildx did not return an image digest" >&2
            exit 1
          fi
          echo "$digest" > "digest-${{ matrix.variant.name }}.txt"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.variant.name }}
          path: digest-${{ matrix.variant.name }}.txt
          if-no-files-found: error

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download pushed-image digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true

      - name: Render manifests with pinned digests
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p release
          for variant in cuda rocm; do
            src="smoothnas-plugin.yaml"
            if [ "$variant" != "cuda" ]; then
              src="smoothnas-plugin-${variant}.yaml"
            fi
            digest="$(cat "digest-${variant}.txt")"
            if [ -z "$digest" ]; then
              echo "missing digest for $variant" >&2
              exit 1
            fi
            out="release/$(basename "$src")"
            image="ghcr.io/rakuensoftware/smoothnas-plugin-vllm:${version}-${variant}"
            python3 - "$src" "$out" "$version" "$image" "$digest" <<'EOF'
          import re
          import sys

          src, out, version, image, digest = sys.argv[1:]
          with open(src, encoding="utf-8") as f:
              manifest = f.read()

          manifest = re.sub(
              r'(?m)^(\s*version:\s*)[^\s#]+(\s*#.*)?$',
              rf'\g<1>{version}\2',
              manifest,
              count=1,
          )
          manifest = re.sub(
              r'(?m)^(\s*image:\s*)ghcr\.io/rakuensoftware/smoothnas-plugin-vllm:[^\s#]+(?:@sha256:[0-9a-f]+)?(\s*#.*)?$',
              rf'\g<1>{image}\2',
              manifest,
              count=1,
          )
          digest_re = re.compile(r'(?m)^(\s*)digest:\s*sha256:[0-9a-f]+(\s*#.*)?$')
          if digest_re.search(manifest):
              manifest = digest_re.sub(rf'\g<1>digest: {digest}\2', manifest, count=1)
          else:
              manifest = re.sub(
                  r'(?m)^(\s*image:\s*[^\n]*\n)',
                  rf'\1  digest: {digest}\n',
                  manifest,
                  count=1,
              )

          with open(out, "w", encoding="utf-8") as f:
              f.write(manifest)
          EOF
          done

      - name: Render index.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release/index.json <<EOF
          {
            "plugin": "vllm",
            "version": "${VERSION}",
            "variants": [
              { "name": "cuda", "manifest": "smoothnas-plugin.yaml", "profile": "gpu-nvidia" },
              { "name": "rocm", "manifest": "smoothnas-plugin-rocm.yaml", "profile": "gpu-amd" }
            ]
          }
          EOF

      - name: Attach manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/smoothnas-plugin.yaml
            release/smoothnas-plugin-rocm.yaml
            release/index.json
