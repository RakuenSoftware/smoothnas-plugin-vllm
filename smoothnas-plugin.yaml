apiVersion: smoothnas.io/v1
kind: Plugin
metadata:
  name: vllm
  version: 0.2.4
  description: |
    vLLM OpenAI-compatible inference server using the official CUDA image for
    NVIDIA GPUs. Hugging Face cache data lives on the NVME slot of an
    operator-chosen tier. Bearer-injected auth is enforced by the SmoothNAS
    wrapper before requests reach vLLM.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-vllm
artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-vllm:0.1.0-cuda
container:
  restartPolicy: unless-stopped
  resources:
    memory: ${MEMORY_LIMIT}
volumes:
  - name: huggingface-cache
    mode: tier-bound
    slot: NVME
    minSize: 50G
    bind: /root/.cache/huggingface
ports:
  - name: http
    port: 8080
    protocol: tcp
    expose: true
ui:
  embed:
    path: /
    auth: bearer-injected
profiles:
  - gpu-nvidia
  - default-limits
config:
  - key: SMOOTHNAS_GPU
    type: gpu
    label: GPU
    gpuVendor: nvidia
    default: ''
    description: |
      NVIDIA GPU device to pass through. Leave automatic to use the host
      default; selecting a device narrows passthrough to that GPU.
  - key: MODEL_ID
    type: string
    label: Model
    default: unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q5_K_XL
    description: >-
      Hugging Face model id, local model path, or GGUF repo:quant passed to
      vLLM.
  - key: HF_TOKEN
    type: string
    label: Hugging Face token
    default: ''
    secret: true
    description: Optional Hugging Face token for gated model downloads.
  - key: VLLM_TOKENIZER
    type: string
    label: Tokenizer
    default: google/gemma-4-26B-A4B-it
    description: Tokenizer id/path, required when MODEL_ID points at a GGUF quant.
  - key: VLLM_HF_CONFIG_PATH
    type: string
    label: HF config path
    default: google/gemma-4-26B-A4B-it
    description: Hugging Face config id/path for GGUF models.
  - key: VLLM_LOAD_FORMAT
    type: select
    label: Load format
    default: gguf
    options:
      - value: auto
      - value: gguf
      - value: safetensors
      - value: bitsandbytes
    description: vLLM weight loader selection.
  - key: VLLM_SERVED_MODEL_NAME
    type: string
    label: Served model name
    default: gemma4-q5-26b
    description: Optional OpenAI model name exposed by vLLM.
  - key: VLLM_TENSOR_PARALLEL_SIZE
    type: number
    label: Tensor parallel size
    default: '1'
    min: '1'
    step: '1'
    description: Number of GPUs used for tensor parallelism.
  - key: VLLM_MAX_MODEL_LEN
    type: number
    label: Max model length
    default: '65536'
    min: '1024'
    step: '1024'
    unit: tokens
    description: Maximum per-request context length passed to vLLM.
  - key: VLLM_MAX_NUM_SEQS
    type: number
    label: Max sequences
    default: '4'
    min: '1'
    step: '1'
    description: Maximum number of concurrent 64k slots.
  - key: VLLM_MAX_NUM_BATCHED_TOKENS
    type: number
    label: Max batched tokens
    default: '262144'
    min: '1024'
    step: '1024'
    unit: tokens
    description: Scheduler token budget for four 64k slots.
  - key: VLLM_GPU_MEMORY_UTILIZATION
    type: number
    label: GPU memory utilization
    default: '0.92'
    min: '0.10'
    max: '1'
    step: '0.01'
    description: Fraction of GPU memory vLLM may reserve.
  - key: VLLM_KV_CACHE_DTYPE
    type: select
    label: KV cache dtype
    default: turboquant_k8v4
    options:
      - value: auto
      - value: fp8
      - value: fp8_e4m3
      - value: fp8_e5m2
      - value: int8_per_token_head
      - value: turboquant_k8v4
    description: >-
      vLLM KV cache storage type. turboquant_k8v4 is the TurboQuant K8/V4
      preset.
  - key: VLLM_KV_CACHE_MEMORY_BYTES
    type: string
    label: KV cache memory
    default: ''
    description: Optional fixed KV cache size accepted by vLLM, such as 20G.
  - key: VLLM_CPU_OFFLOAD_GB
    type: number
    label: CPU offload GiB
    default: ''
    min: '0'
    step: '1'
    description: Optional CPU offload budget for fitting larger checkpoints.
  - key: VLLM_SPECULATIVE_CONFIG
    type: string
    label: Speculative config
    default: >-
      {"method":"mtp","model":"google/gemma-4-26B-A4B-it-assistant","num_speculative_tokens":4}
    description: JSON passed to --speculative-config for Gemma4 MTP.
  - key: VLLM_TOOL_CALL_PARSER
    type: string
    label: Tool call parser
    default: ''
    description: Optional parser passed to --tool-call-parser, such as gemma4.
  - key: VLLM_REASONING_PARSER
    type: string
    label: Reasoning parser
    default: ''
    description: Optional parser passed to --reasoning-parser, such as gemma4.
  - key: VLLM_ENABLE_AUTO_TOOL_CHOICE
    type: select
    label: Auto tool choice
    default: 'off'
    options:
      - value: 'off'
      - value: 'on'
    description: >-
      Enable vLLM automatic tool-call detection when a tool parser is
      configured.
  - key: VLLM_CHAT_TEMPLATE
    type: string
    label: Chat template
    default: ''
    description: Optional chat template path passed to --chat-template.
  - key: VLLM_LIMIT_MM_PER_PROMPT
    type: string
    label: Multimodal limits
    default: ''
    description: >-
      Optional JSON passed to --limit-mm-per-prompt, such as
      {"image":0,"audio":0}.
  - key: VLLM_ENABLE_PREFIX_CACHING
    type: select
    label: Prefix caching
    default: 'on'
    options:
      - value: auto
      - value: 'off'
      - value: 'on'
    description: Optional vLLM prefix cache toggle.
  - key: VLLM_ENABLE_CHUNKED_PREFILL
    type: select
    label: Chunked prefill
    default: auto
    options:
      - value: auto
      - value: 'off'
      - value: 'on'
    description: Optional vLLM chunked prefill toggle.
  - key: VLLM_ASYNC_SCHEDULING
    type: select
    label: Async scheduling
    default: 'off'
    options:
      - value: 'off'
      - value: 'on'
    description: Enable --async-scheduling for higher-throughput vLLM scheduling.
  - key: VLLM_DTYPE
    type: select
    label: Dtype
    default: float16
    options:
      - value: auto
      - value: float16
      - value: bfloat16
    description: vLLM dtype selection.
  - key: VLLM_QUANTIZATION
    type: select
    label: Quantization
    default: none
    options:
      - value: none
      - value: fp8
      - value: awq
      - value: gptq
    description: Optional vLLM quantization mode.
  - key: VLLM_TRUST_REMOTE_CODE
    type: select
    label: Trust remote code
    default: 'on'
    options:
      - value: 'off'
      - value: 'on'
    description: Enable only for model repos whose custom code you trust.
  - key: VLLM_ADDITIONAL_CONFIG
    type: string
    label: Additional config
    default: ''
    description: Optional raw JSON passed to --additional-config.
  - key: MEMORY_LIMIT
    type: string
    label: Container memory
    default: 16GiB
    description: LXC memory limit for the vLLM container.
  - key: SMOOTHNAS_BEARER_EXPECTED
    type: string
    secret: true
    description: |
      Auto-populated by SmoothNAS to match the rotated bearer token.
      Do not edit manually; the wrapper validates every request against it.
